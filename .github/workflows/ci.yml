name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 🧪 Refinery Quality Check
        uses: sircesarium/refinery-rs/ci@v2.0
        with:
          enable-sweet: "true"
          enable-clippy: "true"
          enable-fmt: "true"
          sweet-threshold: "."

  test-multiplatform:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      
      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: 🧪 Run Unit & Integration Tests
        run: cargo test --all-features
