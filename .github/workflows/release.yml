name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            build_lsp: true
            package: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            build_lsp: true
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: i686-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            build_lsp: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            build_lsp: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            use_cross: true
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            build_lsp: true
            package: true
          - target: i686-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            build_lsp: true
          - target: aarch64-apple-darwin
            os: macos-latest
            build_lsp: true

    steps:
      - uses: actions/checkout@v6

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: ⚡ Cache Rust Dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 🛠️ Install Tools
        uses: taiki-e/install-action@v2
        with:
          tool: cross,cargo-deb,cargo-generate-rpm,cargo-wix,cargo-binstall

      - name: 🏗️ Build Binaries
        shell: bash
        run: |
          mkdir -p artifacts
          
          # Build CLI
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
          
          # Build LSP if needed
          if [ "${{ matrix.build_lsp }}" = "true" ]; then
            if [ "${{ matrix.use_cross }}" = "true" ]; then
              cross build --release --target ${{ matrix.target }} --bin sweet-analyzer-lsp --features lsp
            else
              cargo build --release --target ${{ matrix.target }} --bin sweet-analyzer-lsp --features lsp
            fi
          fi

      - name: 📦 Move & Rename Artifacts
        shell: bash
        run: |
          EXE_SUFFIX=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then EXE_SUFFIX=".exe"; fi
          
          # Move CLI
          cp target/${{ matrix.target }}/release/swt${EXE_SUFFIX} artifacts/swt-${{ matrix.target }}${EXE_SUFFIX}
          
          # Move LSP (mapping correctly for extension)
          if [ "${{ matrix.build_lsp }}" = "true" ]; then
            # Map specific targets to simplified names used by download script
            DEST_NAME="sweet-lsp-${{ matrix.os == 'ubuntu-latest' && 'linux' || (matrix.os == 'windows-latest' && 'win' || 'macos') }}"
            if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then DEST_NAME="sweet-lsp-linux-arm64"; fi
            if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then DEST_NAME="sweet-lsp-macos-arm64"; fi
            if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then DEST_NAME="sweet-lsp-macos"; fi
            if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then DEST_NAME="sweet-lsp-linux"; fi
            if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then DEST_NAME="sweet-lsp-win.exe"; fi

            cp target/${{ matrix.target }}/release/sweet-analyzer-lsp${EXE_SUFFIX} artifacts/${DEST_NAME}
          fi

      - name: 📦 Generate .deb & .rpm
        if: ${{ matrix.package && matrix.os == 'ubuntu-latest' }}
        run: |
          cargo deb --target ${{ matrix.target }} --no-build
          cargo generate-rpm --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb artifacts/
          cp target/generate-rpm/*.rpm artifacts/ || cp target/${{ matrix.target }}/generate-rpm/*.rpm artifacts/

      - name: 📦 Generate .msi
        if: ${{ matrix.package && matrix.os == 'windows-latest' }}
        run: |
          cargo wix --target ${{ matrix.target }} --no-build -o artifacts/
        shell: bash

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: artifacts/*

  publish-cargo:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: ⚡ Cache Rust Dependencies
        uses: swatinem/rust-cache@v2
      - name: 🚢 Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 📥 Download All Binaries
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts
          merge-multiple: true
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            all-artifacts/*.exe
            all-artifacts/*.msi
            all-artifacts/*.deb
            all-artifacts/*.rpm
            all-artifacts/swt-*
            all-artifacts/sweet-lsp*
          generate_release_notes: true
